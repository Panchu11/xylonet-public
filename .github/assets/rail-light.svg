<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated x402 flow: an AI agent's USDC payment travels through XyloFacilitator to a seller API; the gate cycles 402 Payment Required, EIP-3009 signed, 200 OK.">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6FBF9"/><stop offset="100%" stop-color="#EDF6F2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="250" rx="18" fill="url(#rbg)" stroke="#D5E7DF"/>

  <text x="600" y="42" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#6B8095">THE x402 LOOP — HOW AN AI AGENT PAYS FOR AN API CALL</text>

  <!-- rail with flowing dashes -->
  <path d="M150 145 H1050" stroke="#C4DAD1" stroke-width="2"/>
  <path d="M150 145 H1050" stroke="#0A9873" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="6 14">
    <animate attributeName="stroke-dashoffset" values="0;-200" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- AGENT node -->
  <rect x="70" y="105" width="160" height="80" rx="14" fill="#FFFFFF" stroke="#0A9873" stroke-opacity="0.55" stroke-width="1.2"/>
  <circle cx="110" cy="145" r="14" fill="none" stroke="#0A9873" stroke-width="2"/>
  <circle cx="105" cy="141" r="2.4" fill="#0A9873"/><circle cx="115" cy="141" r="2.4" fill="#0A9873"/>
  <path d="M104 150 Q110 155 116 150" stroke="#0A9873" stroke-width="2" fill="none"/>
  <text x="138" y="141" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#132D46">AI AGENT</text>
  <text x="138" y="159" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B8095">signs EIP-3009</text>

  <!-- FACILITATOR node -->
  <rect x="520" y="105" width="160" height="80" rx="14" fill="#FFFFFF" stroke="#185FA5" stroke-opacity="0.55" stroke-width="1.2"/>
  <g transform="translate(538,131) scale(0.007)"><path d="M2538.1 1055.9l1479.46 -715.71 -166.6 -340.19 -1126.78 552.82c-235.86,115.75 -492.16,192.18 -701.88,191 -164.65,-0.96 -295.98,-51.56 -323.95,-170.56l-116.03 -493.5 -556.29 282.66 112.2 666 1399.86 27.47zm-1773.36 1151.56l963.73 482.99 1300.68 -612.25 -284 -878.16 -1447.28 -40.03 -1297.87 638.84 19.28 378.55 1054.63 -511.97c230.79,-112.04 482.89,-182.62 694.24,-171.7 173.79,8.98 319.39,74.98 356,221.52l84.82 339.56 -499.09 245.66 -534.44 -292.38 -410.7 199.38z" fill="#01C38E"/></g>
  <text x="600" y="166" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#132D46">XYLOFACILITATOR</text>
  <text x="600" y="180" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6B8095">verifies · settles on Arc</text>

  <!-- SELLER API node with cycling gate -->
  <rect x="970" y="105" width="160" height="80" rx="14" fill="#FFFFFF" stroke="#BA7517" stroke-opacity="0.55" stroke-width="1.2"/>
  <text x="1050" y="132" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#132D46">SELLER API</text>
  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    <g opacity="1">
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.14;0.16;0.8;0.98;1" dur="10s" repeatCount="indefinite"/>
      <rect x="990" y="145" width="120" height="26" rx="13" fill="#A32D2D" fill-opacity="0.12" stroke="#A32D2D" stroke-opacity="0.6"/>
      <text x="1050" y="163" fill="#A32D2D">402 PAYMENT</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.18;0.5;0.53;1" dur="10s" repeatCount="indefinite"/>
      <rect x="990" y="145" width="120" height="26" rx="13" fill="#185FA5" fill-opacity="0.12" stroke="#185FA5" stroke-opacity="0.6"/>
      <text x="1050" y="163" fill="#185FA5">VERIFYING…</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.53;0.56;0.78;0.8;1" dur="10s" repeatCount="indefinite"/>
      <rect x="990" y="145" width="120" height="26" rx="13" fill="#0A7D60" fill-opacity="0.12" stroke="#0A7D60" stroke-opacity="0.6"/>
      <text x="1050" y="163" fill="#0A7D60">200 OK ✓</text>
    </g>
  </g>

  <!-- USDC coin: waits, then travels agent → API -->
  <g>
    <animateMotion dur="10s" repeatCount="indefinite"
      path="M150 145 H1050"
      keyPoints="0;0;1;1" keyTimes="0;0.16;0.5;1" calcMode="linear"/>
    <g transform="translate(-15,-15)">
      <animate attributeName="opacity" values="0;1;1;1;0;0" keyTimes="0;0.1;0.16;0.5;0.56;1" dur="10s" repeatCount="indefinite"/>
      <g transform="scale(0.015)"><path d="M1000 2000c554.17 0 1000-445.83 1000-1000S1554.17 0 1000 0 0 445.83 0 1000s445.83 1000 1000 1000z" fill="#2775ca"/><path d="M1275 1158.33c0-145.83-87.5-195.83-262.5-216.66-125-16.67-150-50-150-108.34s41.67-95.83 125-95.83c75 0 116.67 25 137.5 87.5 4.17 12.5 16.67 20.83 29.17 20.83h66.66c16.67 0 29.17-12.5 29.17-29.16v-4.17c-16.67-91.67-91.67-162.5-187.5-170.83v-100c0-16.67-12.5-29.17-33.33-33.34h-62.5c-16.67 0-29.17 12.5-33.34 33.34v95.83c-125 16.67-204.16 100-204.16 204.17 0 137.5 83.33 191.66 258.33 212.5 116.67 20.83 154.17 45.83 154.17 112.5s-58.34 112.5-137.5 112.5c-108.34 0-145.84-45.84-158.34-108.34-4.16-16.66-16.66-25-29.16-25h-70.84c-16.66 0-29.16 12.5-29.16 29.17v4.17c16.66 104.16 83.33 179.16 220.83 200v100c0 16.66 12.5 29.16 33.33 33.33h62.5c16.67 0 29.17-12.5 33.34-33.33v-100c125-20.84 208.33-108.34 208.33-220.84z" fill="#fff"/><path d="M787.5 1595.83c-325-116.66-491.67-479.16-370.83-800 62.5-175 200-308.33 370.83-370.83 16.67-8.33 25-20.83 25-41.67V325c0-16.67-8.33-29.17-25-33.33-4.17 0-12.5 0-16.67 4.16-395.83 125-612.5 545.84-487.5 941.67 75 233.33 254.17 412.5 487.5 487.5 16.67 8.33 33.34 0 37.5-16.67 4.17-4.16 4.17-8.33 4.17-16.66v-58.34c0-12.5-12.5-29.16-25-37.5zM1229.17 295.83c-16.67-8.33-33.34 0-37.5 16.67-4.17 4.17-4.17 8.33-4.17 16.67v58.33c0 16.67 12.5 33.33 25 41.67 325 116.66 491.67 479.16 370.83 800-62.5 175-200 308.33-370.83 370.83-16.67 8.33-25 20.83-25 41.67V1700c0 16.67 8.33 29.17 25 33.33 4.17 0 12.5 0 16.67-4.16 395.83-125 612.5-545.84 487.5-941.67-75-237.5-258.34-416.67-487.5-491.67z" fill="#fff"/></g>
    </g>
  </g>
  <!-- signature ring drawn around the coin before departure -->
  <circle cx="150" cy="145" r="22" fill="none" stroke="#185FA5" stroke-width="1.6" stroke-dasharray="138" stroke-dashoffset="138" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.14;0.18;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="138;0;0;0" keyTimes="0;0.12;0.16;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- settlement flash at facilitator -->
  <circle cx="600" cy="145" r="26" fill="none" stroke="#0A9873" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.32;0.36;0.42;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="r" values="20;20;34;20" keyTimes="0;0.32;0.42;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- data payload returns API → agent -->
  <g>
    <animateMotion dur="10s" repeatCount="indefinite"
      path="M1050 145 H150"
      keyPoints="0;0;1;1" keyTimes="0;0.6;0.86;1" calcMode="linear"/>
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.58;0.62;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
      <rect x="-16" y="-10" width="32" height="20" rx="6" fill="#0A7D60" fill-opacity="0.14" stroke="#0A7D60" stroke-opacity="0.7"/>
      <text y="4" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#0A7D60">DATA</text>
    </g>
  </g>

  <text x="600" y="226" text-anchor="middle" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" fill="#6B8095">no gas · no cards · no subscriptions — a signature becomes a settled USDC payment on Arc in under a second</text>
</svg>