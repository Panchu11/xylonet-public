<svg width="1200" height="160" viewBox="0 0 1200 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="XyloNet protocol totals — $1.50B volume, 51.09M swaps, 1.63M wallets, $16.4M TVL, 787.5K tips">
  <defs>
