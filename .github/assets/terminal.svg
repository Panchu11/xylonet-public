<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal recording of the agent demo: the agent hits a 402 paywall, signs an EIP-3009 authorization, retries, and gets 200 OK with the data — settled on Arc.">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#101D2E"/><stop offset="100%" stop-color="#0A1420"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="338" rx="16" fill="url(#term)" stroke="#2A4A66"/>
  <rect x="1" y="1" width="1198" height="44" rx="16" fill="#0E1E33"/>
  <rect x="1" y="30" width="1198" height="15" fill="#0E1E33"/>
  <circle cx="28" cy="23" r="6" fill="#E24B4A"/><circle cx="50" cy="23" r="6" fill="#EF9F27"/><circle cx="72" cy="23" r="6" fill="#34D399"/>
  <text x="600" y="28" text-anchor="middle" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="12.5" fill="#7E93A8">agent@xylonet — the x402 demo, exactly as it runs</text>
  <text x="1160" y="28" text-anchor="end" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#54697E">⏺ REC</text>
  
    <g clip-path="url(#tl0)">
      <text x="34" y="96" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#7E93A8" font-weight="700">$ </tspan><tspan fill="#DDE8F2">npm start --prefix xylo-agent-demo/agent</tspan></text>
    </g>
    <clipPath id="tl0"><rect x="30" y="80" width="0" height="24">
      <animate attributeName="width" from="0" to="316.59999999999997" begin="0.4s" dur="1.12s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl1)">
      <text x="34" y="123" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#01C38E" font-weight="700">◈ </tspan><tspan fill="#9FB3C8">agent: "what is the weather in Dubai?" → needs seller API</tspan></text>
    </g>
    <clipPath id="tl1"><rect x="30" y="107" width="0" height="24">
      <animate attributeName="width" from="0" to="440.7" begin="1.6s" dur="1.60s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl2)">
      <text x="34" y="150" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#378ADD" font-weight="700">→ </tspan><tspan fill="#DDE8F2">GET /api/weather/dubai</tspan></text>
    </g>
    <clipPath id="tl2"><rect x="30" y="134" width="0" height="24">
      <animate attributeName="width" from="0" to="185.2" begin="2.9s" dur="0.62s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl3)">
      <text x="34" y="177" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#E24B4A" font-weight="700">✗ </tspan><tspan fill="#F0A9A9">HTTP 402 Payment Required — price: $0.01 USDC</tspan></text>
    </g>
    <clipPath id="tl3"><rect x="30" y="161" width="0" height="24">
      <animate attributeName="width" from="0" to="353.09999999999997" begin="3.8s" dur="1.26s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl4)">
      <text x="34" y="204" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#EF9F27" font-weight="700">✎ </tspan><tspan fill="#F5D9A8">signing EIP-3009 transferWithAuthorization… no gas needed</tspan></text>
    </g>
    <clipPath id="tl4"><rect x="30" y="188" width="0" height="24">
      <animate attributeName="width" from="0" to="440.7" begin="5s" dur="1.60s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl5)">
      <text x="34" y="231" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#378ADD" font-weight="700">→ </tspan><tspan fill="#DDE8F2">GET /api/weather/dubai  +  X-PAYMENT: eyJhbGciOi…</tspan></text>
    </g>
    <clipPath id="tl5"><rect x="30" y="215" width="0" height="24">
      <animate attributeName="width" from="0" to="382.3" begin="6.4s" dur="1.37s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl6)">
      <text x="34" y="258" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#34D399" font-weight="700">✓ </tspan><tspan fill="#B9F5E3">HTTP 200 OK — settled on Arc Testnet, sub-second</tspan></text>
    </g>
    <clipPath id="tl6"><rect x="30" y="242" width="0" height="24">
      <animate attributeName="width" from="0" to="375" begin="7.7s" dur="1.34s" fill="freeze"/>
    </rect></clipPath>
    <g clip-path="url(#tl7)">
      <text x="34" y="285" font-family="ui-monospace,'Cascadia Code',Consolas,'Courier New',monospace" font-size="13.5"><tspan fill="#DDE8F2" font-weight="700">  </tspan><tspan fill="#8FA5BA">{ "city": "Dubai", "temp": "41°C", "paid": "$0.01" }</tspan></text>
    </g>
    <clipPath id="tl7"><rect x="30" y="269" width="0" height="24">
      <animate attributeName="width" from="0" to="404.2" begin="8.8s" dur="1.46s" fill="freeze"/>
    </rect></clipPath>
  <rect x="34" y="299" width="9" height="17" fill="#01C38E" opacity="0">
    <animate attributeName="opacity" values="0;0" dur="9.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="9.6s" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="1160" y="322" text-anchor="end" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#54697E">reproduce it yourself: xylo-agent-demo/ · every call is a real USDC settlement</text>
</svg>