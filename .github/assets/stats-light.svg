      <text x="0" y="104" font-size="13" letter-spacing="1.8" fill="#6B8095">ALL-TIME VOLUME</text>
    </g>
    <path d="M240 45 V115" stroke="#132D46" stroke-opacity="0.1"/>

    <g transform="translate(360,0)" text-anchor="middle">
      <text x="0" y="76" font-size="34" font-weight="800" fill="#132D46">51.09M</text>
      <text x="0" y="104" font-size="13" letter-spacing="1.8" fill="#6B8095">SWAPS EXECUTED</text>
    </g>
    <path d="M480 45 V115" stroke="#132D46" stroke-opacity="0.1"/>

    <g transform="translate(600,0)" text-anchor="middle">
      <text x="0" y="76" font-size="34" font-weight="800" fill="#0A9873">1.63M</text>
      <text x="0" y="104" font-size="13" letter-spacing="1.8" fill="#6B8095">UNIQUE WALLETS</text>
